<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Employee  Directory</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<title>Save Employee</title>
</head>
<body>
 <div class="container">
     <p class="h4 mb-4">Save Employee</p>

     <form action="#" th:action ="@{/employees/save}"
                      th:object ="${employee}" method ="POST">

         <!-- Add hidden form field to handle the update -->
         <input type="hidden" th:field ="*{id}">

         <input type="text" th:field ="*{firstName}"
         class="form-control mb-4 w-25" placeholder="First name">

         <input type="text" th:field ="*{lastName}"
                class="form-control mb-4 w-25" placeholder="Last name">

         <input type="text" th:field ="*{email}"
                class="form-control mb-4 w-25" placeholder="Email">
         <br><br>
         Country:
         <select th:field ="*{country}">
             <option th:value="Germany">Germany</option>
             <option th:value ="Bangladesh">Bangladesh</option>
             <option th:value ="Netherlands">Netherlands</option>
             <option th:value="India">India</option>
         </select>
         <br><br>
         Favorite Programming Language:
         <input type="radio" th:field ="*{favoriteLanguage}" th:value="Go">Go</input>
         <input type="radio" th:field ="*{favoriteLanguage}" th:value="Go">Java</input>
         <input type="radio" th:field ="*{favoriteLanguage}" th:value="Go">Python</input>

         <button type ="submit" class="btn btn-info col-2">Save</button>

     </form>
     <hr>
     <a th:href ="@{/employees/list}">Back to Employees List </a>
 </div>
</body>
</html>
